baseURL = "https://linjiah.github.io/"
locale = "en-us"
title = "Linjia Hu"
theme = ["github.com/adityatelange/hugo-PaperMod"]

enableRobotsTXT = true
buildDrafts = false
buildFuture = false

defaultContentLanguage = "en"

mainSections = ["posts"]

[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]

[module]
[[module.imports]]
path = "github.com/adityatelange/hugo-PaperMod"

[menu]
[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 10

[[menu.main]]
